name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kana-srs/package-lock.json

      - name: Install dependencies
        working-directory: kana-srs
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: kana-srs
        run: npm test

      - name: Build
        working-directory: kana-srs
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: kana-srs/dist

      - id: deployment
        uses: actions/deploy-pages@v4
